# Meta-ensemble configuration.
#
# GoalSignal's product output is calibrated win/advance probabilities. The
# meta-ensemble blends independent *signals* (each a probability distribution
# over outcomes) with configurable weights. Weights are NOT hardcoded in the
# model layer — they live here and are renormalized across whichever signals
# are actually available for a given match.
#
# Signal names must match the keys produced by the signal layer:
#   historical      — the deployed statistical model (Elo/Poisson/DC ensemble)
#   market          — market-implied probabilities (vig removed)
#   squad_strength  — manual squad-strength file
#   recent_form     — opponent-adjusted recent form
#   expert          — LLM/expert consensus
#   venue_context   — host/travel/rest/climate context
#   match_context   — timestamped lineup/availability/GK/fatigue/quality/tactics
#   knockout_upset  — knockout-only "survive and advance" adjustment (opt-in)
#
# knockout_upset is produced ONLY for knockout matches and ONLY when the caller
# opts in (`--include-knockout-upset`). When it is absent the missing-signal
# renormalization drops its weight, so group matches and non-opted knockout runs
# are unchanged. It is therefore safe to list its weight here.

# Default product weights (the "final_ensemble" model version).
default_weights:
  historical: 0.35
  market: 0.25
  squad_strength: 0.15
  recent_form: 0.10
  expert: 0.10
  venue_context: 0.05

# Named model versions for backtesting and champion/challenger comparison.
# Each is a weight map over signals; weights renormalize over available signals.
model_versions:
  baseline_historical:
    historical: 1.0
  market_only:
    market: 1.0
  squad_form_challenger:
    historical: 0.50
    squad_strength: 0.30
    recent_form: 0.20
  llm_adjusted_challenger:
    historical: 0.60
    expert: 0.40
  final_ensemble:
    historical: 0.35
    market: 0.25
    squad_strength: 0.15
    recent_form: 0.10
    expert: 0.10
    venue_context: 0.05
    knockout_upset: 0.05  # only present for opted-in knockout matches
  # Knockout-tuned profile that leans on the survival adjustment. Use with
  # --ensemble-version knockout_survival --include-knockout-upset. For group
  # matches knockout_upset is absent and the rest renormalize.
  knockout_survival:
    historical: 0.35
    market: 0.30
    squad_strength: 0.10
    recent_form: 0.08
    venue_context: 0.05
    expert: 0.07
    knockout_upset: 0.05
  # Opt-in late-information challenger. Its context signal is anchored to the
  # base forecast, timestamp-validated and capped; evaluate before promotion.
  context_challenger:
    historical: 0.35
    market: 0.25
    squad_strength: 0.10
    recent_form: 0.08
    expert: 0.05
    venue_context: 0.05
    match_context: 0.12

# Parameters for the adjustment-style signals (squad/form/venue), which convert
# a scalar strength edge into a W/D/L distribution via the Davidson map.
signal_params:
  davidson_scale: 400.0     # Elo logistic scale
  davidson_nu: 1.0          # draw propensity
  squad_points_per_z: 60.0  # Elo-like points per standardized squad-strength unit
  form_points_per_z: 40.0   # ... per standardized recent-form unit
  venue:
    travel_per_1000km: 8.0
    rest_per_day: 6.0
    timezone_per_hour: 3.0
  match_context:
    points_scale: 400.0
    component_cap: 25.0
    total_cap: 60.0
    max_probability_shift: 0.12
  # Knockout "survive and advance" coefficients. All modest and bounded; the
  # adjustment is anchored so no style/penalty evidence => exactly no change, and
  # the per-match advance shift is hard-capped by max_advance_shift.
  knockout_upset:
    base_expected_goals: 2.6      # typical two-team knockout goal total
    edge_per_advance: 1.6         # base advance gap -> dimensionless skill gap
    low_block_eg: 0.7             # underdog low block suppresses goals (more pens)
    compactness_eg: 0.5
    sterile_eg: 0.4               # favourite sterile possession suppresses goals
    transition_eg: 0.3
    creation_eg: 0.3
    struggles_block_edge: 0.45    # favourite struggles vs an actual low block
    sterile_edge: 0.30
    transition_edge: 0.30
    set_piece_edge: 0.30
    shootout_beta: 0.10           # per unit shootout-rating gap
    shootout_cap: 0.12            # hard cap on shootout deviation from 0.5
    shootout_prior_strength: 6.0  # pseudo-matches shrinking history to 50/50
    current_pen_weight: 0.7       # current keeper/taker over old country history
    history_pen_weight: 0.3
    max_advance_shift: 0.15       # hard cap on the per-match advance shift

# Market overround removal: "proportional" (booksum scaling) or "power" (Shin).
market_overround_method: proportional

# Knockout reduction: probability team A survives a tie that reaches penalties.
knockout_tiebreak_a_prob: 0.5

# Disagreement threshold (total-variation distance) above which a match is
# flagged for manual review by `goalsignal signals disagreement`.
disagreement_threshold: 0.15
